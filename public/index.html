<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureFileSync | Choose Role</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #0f0c29 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .landing {
            text-align: center;
            padding: 40px;
        }

        .logo {
            margin-bottom: 50px;
        }

        .logo h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .logo p {
            color: #a0a0c0;
            font-size: 1rem;
        }

        .badge {
            display: inline-block;
            background: rgba(102, 126, 234, 0.2);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #818cf8;
            margin-top: 15px;
        }

        .role-cards {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .role-card {
            background: rgba(20, 20, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            padding: 40px 50px;
            width: 280px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .role-card:hover {
            transform: translateY(-8px);
            border-color: rgba(102, 126, 234, 0.8);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
        }

        .role-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .role-card h2 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .role-card p {
            color: #a0a0c0;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .role-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .role-btn:hover {
            transform: scale(1.05);
        }

        .sender-icon { color: #667eea; }
        .receiver-icon { color: #764ba2; }

        @media (max-width: 700px) {
            .role-cards {
                gap: 20px;
            }
            .role-card {
                padding: 30px 35px;
                width: 240px;
            }
            .logo h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="landing">
        <div class="logo">
            <h1><i class="fas fa-shield-alt"></i> SecureFileSync</h1>
            <p>AES-256 Encrypted File Transfer System</p>
            <div class="badge">
                <i class="fas fa-lock"></i> End-to-End Encryption | Auto-expiring Sessions
            </div>
        </div>

        <div class="role-cards">
            <!-- Sender Card -->
            <div class="role-card" onclick="goToSender()">
                <div class="role-icon sender-icon">
                    <i class="fas fa-paper-plane"></i>
                </div>
                <h2>Sender</h2>
                <p>Create a session, upload files, send encrypted data to receiver</p>
                <button class="role-btn">Continue as Sender →</button>
            </div>

            <!-- Receiver Card -->
            <div class="role-card" onclick="goToReceiver()">
                <div class="role-icon receiver-icon">
                    <i class="fas fa-download"></i>
                </div>
                <h2>Receiver</h2>
                <p>Join a session, receive text messages, download decrypted files</p>
                <button class="role-btn">Continue as Receiver →</button>
            </div>
        </div>
    </div>

    <script>
        function goToSender() {
            window.location.href = "/sender.html";
        }

        function goToReceiver() {
            window.location.href = "/receiver.html";
        }
    </script>
</body>
</html>
