<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureFileSync | Secure Video Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/theme.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .call-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .video-wrapper {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: white;
        }
        
        .call-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .control-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }
        
        .control-btn.mic-off {
            background: rgba(239, 68, 68, 0.8);
        }
        
        .control-btn.camera-off {
            background: rgba(239, 68, 68, 0.8);
        }
        
        .end-call {
            background: rgba(239, 68, 68, 0.9);
        }
        
        .end-call:hover {
            background: #ef4444;
        }
        
        .connecting-status {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
        }
        
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .toast {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            animation: slideIn 0.3s ease;
            border-left: 4px solid var(--primary);
        }
        
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .text-gradient {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="call-container">
        <div class="top-bar">
            <h1><i class="fas fa-video"></i> <span class="text-gradient">Secure Video Call</span></h1>
            <button class="btn-secondary" onclick="exitCall()"><i class="fas fa-arrow-left"></i> Exit</button>
        </div>
        
        <div class="video-grid">
            <div class="video-wrapper">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label"><i class="fas fa-user"></i> You</div>
            </div>
            <div class="video-wrapper">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label"><i class="fas fa-user"></i> Remote</div>
            </div>
        </div>
        
        <div class="call-controls">
            <button class="control-btn" id="micBtn" onclick="toggleMic()">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="control-btn" id="cameraBtn" onclick="toggleCamera()">
                <i class="fas fa-video"></i>
            </button>
            <button class="control-btn end-call" onclick="endCall()">
                <i class="fas fa-phone-slash"></i>
            </button>
        </div>
        
        <div id="connectingStatus" class="connecting-status">
            <i class="fas fa-spinner fa-spin"></i> Initializing secure call...
        </div>
    </div>
    
    <div id="toastContainer" class="toast-container"></div>
    
    <script>
        let webRTC = null;
        let socket = null;
        let sessionId = null;
        
        function showToast(msg, type = 'info') {
            let container = document.getElementById('toastContainer');
            let toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');
            toast.innerHTML = `<i class="fas ${icon}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.4s forwards';
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }
        
        // WebRTC Call Class
        class WebRTCCall {
            constructor(socket, sessionId, localVideo, remoteVideo) {
                this.socket = socket;
                this.sessionId = sessionId;
                this.localVideo = localVideo;
                this.remoteVideo = remoteVideo;
                this.peerConnection = null;
                this.localStream = null;
                this.isCallActive = false;
                this.isMicEnabled = true;
                this.isCameraEnabled = true;
                
                this.configuration = {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' }
                    ]
                };
                
                this.setupSocketListeners();
            }
            
            setupSocketListeners() {
                this.socket.on('offer', async ({ offer, fromId }) => {
                    await this.handleOffer(offer, fromId);
                });
                
                this.socket.on('answer', async ({ answer }) => {
                    await this.handleAnswer(answer);
                });
                
                this.socket.on('ice-candidate', async ({ candidate }) => {
                    await this.handleIceCandidate(candidate);
                });
                
                this.socket.on('user-left', ({ userId }) => {
                    this.handleUserLeft(userId);
                });
            }
            
            async startCall() {
                try {
                    this.localStream = await navigator.mediaDevices.getUserMedia({ 
                        video: true, 
                        audio: true 
                    });
                    this.localVideo.srcObject = this.localStream;
                    
                    this.createPeerConnection();
                    
                    this.localStream.getTracks().forEach(track => {
                        this.peerConnection.addTrack(track, this.localStream);
                    });
                    
                    const offer = await this.peerConnection.createOffer();
                    await this.peerConnection.setLocalDescription(offer);
                    
                    this.socket.emit('offer', {
                        sessionId: this.sessionId,
                        offer: offer,
                        targetId: null
                    });
                    
                    this.isCallActive = true;
                    document.getElementById('connectingStatus').style.display = 'none';
                    showToast('Secure call established!', 'success');
                    return true;
                } catch (error) {
                    console.error('Error starting call:', error);
                    showToast('Could not access camera/microphone. Please check permissions.', 'error');
                    return false;
                }
            }
            
            createPeerConnection() {
                this.peerConnection = new RTCPeerConnection(this.configuration);
                
                this.peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        this.socket.emit('ice-candidate', {
                            sessionId: this.sessionId,
                            candidate: event.candidate,
                            targetId: null
                        });
                    }
                };
                
                this.peerConnection.ontrack = (event) => {
                    this.remoteVideo.srcObject = event.streams[0];
                };
                
                this.peerConnection.onconnectionstatechange = () => {
                    console.log('Connection state:', this.peerConnection.connectionState);
                    if (this.peerConnection.connectionState === 'connected') {
                        showToast('Call connected!', 'success');
                    } else if (this.peerConnection.connectionState === 'disconnected') {
                        showToast('Call disconnected', 'error');
                    }
                };
            }
            
            async handleOffer(offer, fromId) {
                if (!this.peerConnection) {
                    this.createPeerConnection();
                }
                
                await this.peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                
                if (!this.localStream) {
                    this.localStream = await navigator.mediaDevices.getUserMedia({ 
                        video: true, 
                        audio: true 
                    });
                    this.localVideo.srcObject = this.localStream;
                    this.localStream.getTracks().forEach(track => {
                        this.peerConnection.addTrack(track, this.localStream);
                    });
                }
                
                const answer = await this.peerConnection.createAnswer();
                await this.peerConnection.setLocalDescription(answer);
                
                this.socket.emit('answer', {
                    sessionId: this.sessionId,
                    answer: answer,
                    targetId: fromId
                });
                
                this.isCallActive = true;
                document.getElementById('connectingStatus').style.display = 'none';
            }
            
            async handleAnswer(answer) {
                await this.peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            }
            
            async handleIceCandidate(candidate) {
                if (this.peerConnection) {
                    await this.peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                }
            }
            
            handleUserLeft(userId) {
                showToast('Other user left the call', 'error');
                this.endCall();
            }
            
            toggleMic() {
                if (this.localStream) {
                    const audioTrack = this.localStream.getAudioTracks()[0];
                    if (audioTrack) {
                        this.isMicEnabled = !this.isMicEnabled;
                        audioTrack.enabled = this.isMicEnabled;
                        const micBtn = document.getElementById('micBtn');
                        if (this.isMicEnabled) {
                            micBtn.classList.remove('mic-off');
                            micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                        } else {
                            micBtn.classList.add('mic-off');
                            micBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
                        }
                        this.socket.emit('toggle-mic', {
                            sessionId: this.sessionId,
                            enabled: this.isMicEnabled
                        });
                    }
                }
            }
            
            toggleCamera() {
                if (this.localStream) {
                    const videoTrack = this.localStream.getVideoTracks()[0];
                    if (videoTrack) {
                        this.isCameraEnabled = !this.isCameraEnabled;
                        videoTrack.enabled = this.isCameraEnabled;
                        const cameraBtn = document.getElementById('cameraBtn');
                        if (this.isCameraEnabled) {
                            cameraBtn.classList.remove('camera-off');
                            cameraBtn.innerHTML = '<i class="fas fa-video"></i>';
                        } else {
                            cameraBtn.classList.add('camera-off');
                            cameraBtn.innerHTML = '<i class="fas fa-video-slash"></i>';
                        }
                        this.socket.emit('toggle-camera', {
                            sessionId: this.sessionId,
                            enabled: this.isCameraEnabled
                        });
                    }
                }
            }
            
            endCall() {
                if (this.localStream) {
                    this.localStream.getTracks().forEach(track => track.stop());
                    this.localStream = null;
                }
                
                if (this.peerConnection) {
                    this.peerConnection.close();
                    this.peerConnection = null;
                }
                
                this.localVideo.srcObject = null;
                this.remoteVideo.srcObject = null;
                this.isCallActive = false;
                
                this.socket.emit('leave-call', { sessionId: this.sessionId });
            }
        }
        
        async function initCall() {
            const urlParams = new URLSearchParams(window.location.search);
            sessionId = urlParams.get('sessionId');
            
            if (!sessionId) {
                showToast('No session ID provided. Please join a session first.', 'error');
                return;
            }
            
            socket = io();
            
            socket.on('connect', () => {
                showToast('Connected to signaling server', 'success');
                socket.emit('join-call', { sessionId, userId: socket.id });
                
                const localVideo = document.getElementById('localVideo');
                const remoteVideo = document.getElementById('remoteVideo');
                
                webRTC = new WebRTCCall(socket, sessionId, localVideo, remoteVideo);
                
                webRTC.startCall();
            });
            
            socket.on('connect_error', () => {
                showToast('Failed to connect to signaling server', 'error');
            });
            
            socket.on('existing-users', ({ users }) => {
                console.log('Existing users in call:', users);
            });
        }
        
        function toggleMic() {
            if (webRTC) {
                webRTC.toggleMic();
            }
        }
        
        function toggleCamera() {
            if (webRTC) {
                webRTC.toggleCamera();
            }
        }
        
        function endCall() {
            if (webRTC) {
                webRTC.endCall();
            }
            if (socket) {
                socket.disconnect();
            }
            showToast('Call ended', 'info');
            setTimeout(() => {
                window.location.href = `/receiver.html?code=${sessionId}`;
            }, 1500);
        }
        
        function exitCall() {
            if (webRTC) {
                webRTC.endCall();
            }
            if (socket) {
                socket.disconnect();
            }
            window.location.href = `/receiver.html?code=${sessionId}`;
        }
        
        window.addEventListener('DOMContentLoaded', initCall);
    </script>
</body>
</html>
