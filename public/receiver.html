<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureFileSync | Receiver Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 10; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .top-bar h1 { font-size: 2rem; display: flex; align-items: center; gap: 12px; }
        
        .card-head { padding: 25px 35px; border-bottom: 1px solid var(--glass-border); }
        .card-head h2 { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; color: var(--text-main); }
        .card-head h2 i { color: var(--accent); }
        .card-body { padding: 35px; }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; margin-bottom: 10px; color: var(--text-muted); font-size: 0.9rem; font-weight: 500;}

        .btn-block { width: 100%; justify-content: center; margin-top: 10px; }
        .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); border:none;}
        .btn-danger:hover { box-shadow: 0 8px 25px rgba(239, 68, 68, 0.6); }

        .info-box { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 25px; margin: 25px 0; border: 1px solid var(--glass-border); }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1.05rem; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-muted); font-weight: 500; }
        .info-value { color: #fff; font-weight: 600; font-family: monospace; }
        
        .alert-box { padding: 16px 20px; border-radius: 12px; margin: 20px 0; font-size: 0.95rem; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .alert-green { background: rgba(16, 185, 129, 0.15); border-left: 4px solid var(--success); color: var(--success); }
        .alert-red { background: rgba(239, 68, 68, 0.15); border-left: 4px solid var(--danger); color: var(--danger); }
        .alert-blue { background: rgba(99, 102, 241, 0.15); border-left: 4px solid var(--primary); color: #818cf8; }
        .alert-yellow { background: rgba(245, 158, 11, 0.15); border-left: 4px solid #f59e0b; color: #fbbf24; }
        
        hr { border: none; height: 1px; background: var(--glass-border); margin: 30px 0; }
        h3 { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 1.2rem; }
        h3 i { color: var(--accent); }

        .msg-box { background: rgba(0,0,0,0.5); border-radius: 16px; padding: 20px; margin: 20px 0; word-wrap: break-word; font-size: 1.1rem; line-height: 1.5; border: 1px solid rgba(99, 102, 241, 0.3); box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        
        .one-time-badge { background: rgba(139, 92, 246, 0.2); border-radius: 20px; padding: 4px 12px; font-size: 0.7rem; color: var(--accent); margin-left: 10px; }
        .unavailable-file { opacity: 0.6; filter: grayscale(0.3); }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div id="toastContainer" class="toast-container"></div>

    <div class="container">
        <div class="top-bar">
            <h1><i class="fas fa-download"></i> <span class="text-gradient">Receiver Panel</span></h1>
            <button class="btn-secondary" onclick="goHome()"><i class="fas fa-arrow-left"></i> Home</button>
        </div>
        
        <div class="glass-panel card">
            <div class="card-head"><h2><i class="fas fa-plug"></i> Join Secure Session</h2></div>
            <div class="card-body">
                <div class="input-group">
                    <label>Session Code</label>
                    <input type="text" id="sessionInput" placeholder="Paste the session code here to connect" style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 12px; padding: 14px 20px; color: var(--text-main); font-family: var(--font-body); width: 100%; outline: none; margin-bottom: 5px;">
                </div>
                <div id="passwordRequiredBox" style="display:none; margin-bottom: 15px;">
                    <input type="password" id="sessionPassword" placeholder="Session Password" style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 12px; padding: 14px 20px; color: var(--text-main); width: 100%; outline: none;">
                </div>
                <button class="btn-primary btn-block" style="background: linear-gradient(135deg, var(--accent) 0%, #be185d 100%);" onclick="joinNow()"><i class="fas fa-link"></i> Connect to Session</button>
                
                <div id="sessionPanel" style="display:none; margin-top: 30px;">
                    <div class="info-box">
                        <div class="info-row"><span class="info-label">Session Status</span><span class="info-value" id="sessionState">--</span></div>
                        <div class="info-row"><span class="info-label">Connection</span><span class="info-value" id="connectState">--</span></div>
                        <div class="info-row"><span class="info-label">File Status</span><span class="info-value" id="fileState">--</span></div>
                        <div class="info-row"><span class="info-label">Time Remaining</span><span class="info-value" id="timeLeft" style="color: var(--primary);">--</span></div>
                    </div>
                    
                    <hr>
                    <h3><i class="fas fa-comment-dots"></i> Receive Encrypted Text</h3>
                    <button class="btn-secondary btn-block" onclick="getText()"><i class="fas fa-sync-alt"></i> Check for New Messages</button>
                    <div id="textBox" style="display:none;" class="msg-box"></div>
                    
                    <hr>
                    <h3><i class="fas fa-file-shield"></i> Receive Encrypted Files <span class="one-time-badge"><i class="fas fa-hourglass-half"></i> One-Time Download</span></h3>
                    <button class="btn-secondary btn-block" onclick="getFileInfo()"><i class="fas fa-sync-alt"></i> Check for New Files</button>
                    <div id="fileInfoBox"></div>
                </div>
                <div id="msgArea"></div>
            </div>
        </div>
    </div>
    
    <script>
        let myCode = null;
        let intervalId = null;
        let sessionPassword = null;
        
        function showToast(msg, type='success'){
            let container = document.getElementById('toastContainer');
            let toast=document.createElement('div');
            toast.className=`toast ${type}`;
            let icon = type==='success' ? 'fa-check-circle' : (type==='error'?'fa-exclamation-circle':'fa-info-circle');
            toast.innerHTML=`<i class="fas ${icon}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.4s forwards';
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }
        
        function showAlert(msg,type){
            let box=document.getElementById('msgArea');
            let cls=type==='success'?'alert-green':(type==='error'?'alert-red':'alert-blue');
            let icon = type==='success' ? 'fa-check-circle' : (type==='error'?'fa-times-circle':'fa-info-circle');
            box.innerHTML=`<div class="alert-box ${cls}"><i class="fas ${icon}"></i> ${msg}</div>`;
            setTimeout(()=>{if(box.innerHTML.includes(msg)) box.innerHTML='';},5000);
        }
        
        function goHome(){
            if(intervalId) clearInterval(intervalId);
            window.location.href='/';
        }
        
        function loadCodeFromUrl(){
            let urlParams = new URLSearchParams(window.location.search);
            let sessionCode = urlParams.get('code');
            if(sessionCode){
                document.getElementById('sessionInput').value = sessionCode;
                showToast('Session code loaded from secure link!','success');
                setTimeout(() => { checkIfPasswordRequired(); }, 500);
            }
        }
        
        async function checkIfPasswordRequired() {
            let code = document.getElementById('sessionInput').value.trim();
            if(!code) return;
            try {
                let res = await fetch(`/session/info/${code}`);
                let data = await res.json();
                if(data.requiresPassword) {
                    document.getElementById('passwordRequiredBox').style.display = 'block';
                    showToast('This session is password protected. Please enter the password.', 'info');
                } else {
                    document.getElementById('passwordRequiredBox').style.display = 'none';
                }
            } catch(e) {}
        }
        
        async function joinNow(){
            let code=document.getElementById('sessionInput').value.trim();
            if(!code){showAlert('Please enter a session code','error');return;}
            
            let password = document.getElementById('sessionPassword')?.value || null;
            myCode = code;
            sessionPassword = password;
            
            try{
                let res=await fetch(`/session/join/${code}`,{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ password: password })
                });
                let data=await res.json();
                if(data.msg === 'receiver joined' || data.msg === 'receiver joined the session'){
                    document.getElementById('sessionPanel').style.display='block';
                    window.scrollTo({ top: document.getElementById('sessionPanel').offsetTop, behavior: 'smooth' });
                    showToast('✅ Connection securely established!','success');
                    startChecking();
                } else if(data.msg === 'password required') {
                    document.getElementById('passwordRequiredBox').style.display = 'block';
                    showAlert('This session requires a password. Please enter it and try again.', 'error');
                } else if(data.msg === 'incorrect password') {
                    showAlert('Incorrect password. Please try again.', 'error');
                } else {
                    showAlert(data.msg || 'Connection failed','error');
                }
            }catch(e){
                showAlert('Connection error. Is the server running?','error');
            }
        }
        
        document.getElementById('sessionInput')?.addEventListener('input', function() {
            if(this.value.trim()) {
                checkIfPasswordRequired();
            } else {
                document.getElementById('passwordRequiredBox').style.display = 'none';
            }
        });
        
        async function startChecking(){
            if(intervalId) clearInterval(intervalId);
            
            let checkSession=async()=>{
                if(!myCode) return;
                try{
                    let statusRes=await fetch(`/session/status/${myCode}`);
                    let status=await statusRes.json();
                    
                    if(status.status === 'gone'){
                        showToast('⚠️ Session permanently terminated by sender! Redirecting...','error');
                        if(intervalId) clearInterval(intervalId);
                        setTimeout(()=>{ window.location.href='/'; },2500);
                        return;
                    }
                    
                    document.getElementById('sessionState').innerHTML = '<span style="color:var(--success)"><i class="fas fa-circle" style="font-size:0.6em;vertical-align:middle;margin-right:5px;"></i>Active</span>';
                    document.getElementById('connectState').innerHTML = status.receiverOnline ? '<span style="color:var(--success)">Linked</span>' : '<span style="color:#fbbf24">Pending</span>';
                    document.getElementById('fileState').innerHTML = status.hasFile ? '<span style="color:var(--primary)">Encrypted File Vault Ready</span>' : '<span style="color:var(--text-muted)">Awaiting Upload</span>';
                    
                    try{
                        let infoRes=await fetch(`/session/info/${myCode}`);
                        let info=await infoRes.json();
                        if(info.exists && info.remainingTime){
                            let s = Math.floor(info.remainingTime);
                            if(s<0) s=0;
                            let mins=Math.floor(s/60);
                            let secs=Math.floor(s%60);
                            let el = document.getElementById('timeLeft');
                            el.innerHTML=`${mins}:${secs.toString().padStart(2,'0')}`;
                            if(s<30) el.style.color='var(--danger)';
                            else el.style.color='var(--text-main)';
                        }
                    }catch(e){}
                    
                }catch(e){}
            };
            
            checkSession();
            intervalId=setInterval(checkSession,3000);
        }
        
        async function getText(){
            if(!myCode){showAlert('Join a session first','error');return;}
            try{
                let res=await fetch(`/session/receive/${myCode}`);
                let data=await res.json();
                let showDiv=document.getElementById('textBox');
                if(data.data){
                    showDiv.style.display='block';
                    showDiv.innerHTML=`<div style="color:var(--success); font-weight:bold; margin-bottom:10px;"><i class="fas fa-lock"></i> Decrypted Core Message:</div><div>"${data.data}"</div>`;
                    showToast('📨 Encrypted payload decrypted and received!');
                }else{
                    showToast('No new messages available.','error');
                }
            }catch(e){showAlert('Error retrieving data.','error');}
        }
        
        async function getFileInfo(){
            if(!myCode){showAlert('Join a session first','error');return;}
            try{
                let res=await fetch(`/session/file-info/${myCode}`);
                let data=await res.json();
                let infoDiv=document.getElementById('fileInfoBox');
                
                if(data.files && data.files.length > 0){
                    let htmlList = '';
                    data.files.forEach(f => {
                        let kb=(f.fileSize/1024).toFixed(2);
                        let isAvailable = f.isAvailable !== false;
                        let unavailableClass = isAvailable ? '' : 'unavailable-file';
                        htmlList += `
                        <div class="alert-box alert-green" style="margin-top:10px; display:flex; justify-content:space-between; align-items:center;">
                            <div class="${unavailableClass}">
                                <i class="fas fa-file-invoice"></i> 
                                <div style="display:inline-block; margin-left: 10px;">
                                    <strong>${f.fileName}</strong><br>
                                    <span style="opacity:0.8; font-size:0.85em;">${kb} KB | AES-256 Encrypted Vault</span>
                                    ${!isAvailable ? '<br><small style="color: #f59e0b;"><i class="fas fa-check-circle"></i> Already downloaded (One-time link expired)</small>' : '<br><small style="color: #10b981;"><i class="fas fa-hourglass-half"></i> One-time download - available once</small>'}
                                </div>
                            </div>
                            ${isAvailable ? `<a href="/session/download/${myCode}?fileId=${f.id}" class="btn-primary" style="text-decoration:none; padding:10px 15px; font-size:0.9em; box-shadow:none;"><i class="fas fa-cloud-download-alt"></i> Download</a>` : '<span style="padding:10px 15px; background:rgba(100,100,100,0.3); border-radius:12px; font-size:0.9em;">Expired</span>'}
                        </div>`;
                    });
                    infoDiv.innerHTML = htmlList;
                    showToast(`📁 ${data.files.length} Encrypted file streams ready for download (One-time use!)`);
                }else{
                    infoDiv.innerHTML = '';
                    showToast('No encrypted files uploaded yet.','error');
                }
            }catch(e){showAlert('Failed to poll file info.','error');}
        }
        
        async function endSession(){
            if(!myCode){
                showAlert('No active session','error');
                return;
            }
            
            let confirmEnd=confirm('End this session? Cryptographic session keys will be wiped.');
            if(!confirmEnd) return;
            
            try{
                let res=await fetch(`/session/terminate/${myCode}`,{method:'POST'});
                let data=await res.json();
                if(data.terminated===true || data.msg.includes('terminated')){
                    showToast('✅ Session securely terminated! Exiting...');
                    if(intervalId) clearInterval(intervalId);
                    setTimeout(()=>{
                        window.location.href='/';
                    },1500);
                }else{
                    showAlert(data.msg||'Failed to safely close','error');
                }
            }catch(e){
                showAlert('Error closing session safely.','error');
            }
        }
        
        window.addEventListener('DOMContentLoaded', loadCodeFromUrl);
    </script>
</body>
</html>
