<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureFileSync | Sender Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f0c29,#1a1a3e,#0f0c29);min-height:100vh;padding:30px;}
        .container{max-width:900px;margin:0 auto;}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
        .top-bar h1{font-size:1.8rem;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .back-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(102,126,234,0.5);padding:10px 20px;border-radius:30px;color:white;cursor:pointer;}
        .card{background:rgba(20,20,45,0.7);backdrop-filter:blur(12px);border-radius:28px;border:1px solid rgba(102,126,234,0.3);margin-bottom:20px;}
        .card-head{padding:22px 28px;background:rgba(0,0,0,0.4);border-bottom:1px solid rgba(255,255,255,0.05);}
        .card-head h2{font-size:1.3rem;color:#fff;}.card-head h2 i{margin-right:10px;color:#667eea;}
        .card-body{padding:28px;}
        .input-group{margin-bottom:20px;}
        .input-group label{display:block;margin-bottom:8px;color:#c4c4e0;font-size:0.8rem;}
        .input-group input,.input-group textarea{width:100%;padding:12px 16px;background:rgba(0,0,0,0.4);border:1px solid rgba(102,126,234,0.3);border-radius:12px;color:#fff;font-size:0.9rem;}
        .btn{padding:12px 24px;border-radius:12px;font-weight:600;cursor:pointer;border:none;font-size:0.9rem;margin:5px;}
        .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:white;}
        .btn-second{background:rgba(255,255,255,0.08);color:#c4c4e0;border:1px solid rgba(102,126,234,0.4);}
        .btn-danger{background:rgba(239,68,68,0.8);color:white;border:1px solid #ef4444;}
        .btn-danger:hover{background:#ef4444;}
        .btn-block{width:100%;}
        .session-box{background:rgba(0,0,0,0.5);border-radius:14px;padding:15px;text-align:center;margin:15px 0;font-family:monospace;font-size:1rem;}
        .timer-card{background:linear-gradient(135deg,rgba(102,126,234,0.15),rgba(118,75,162,0.15));border-radius:16px;padding:20px;text-align:center;margin:20px 0;}
        .timer-digits{font-size:2.5rem;font-weight:700;font-family:monospace;color:#fff;}
        .timer-label{font-size:0.7rem;color:#a0a0c0;margin-top:5px;}
        .timer-danger{color:#ef4444;animation:pulse 1s infinite;}
        .timer-warning{color:#f59e0b;}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
        .progress-wrapper{margin:20px 0;}
        .progress-bar-bg{background:rgba(0,0,0,0.5);border-radius:30px;height:8px;overflow:hidden;}
        .progress-fill{width:0%;height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:30px;transition:width 0.3s;}
        .progress-stats{display:flex;justify-content:space-between;margin-top:8px;font-size:0.7rem;color:#a0a0c0;}
        .status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:0.7rem;font-weight:600;}
        .badge-active{background:rgba(16,185,129,0.2);color:#10b981;}
        .alert-box{padding:12px 15px;border-radius:12px;margin:15px 0;font-size:0.8rem;}
        .alert-green{background:rgba(16,185,129,0.15);border-left:3px solid #10b981;color:#10b981;}
        .alert-red{background:rgba(239,68,68,0.15);border-left:3px solid #ef4444;color:#ef4444;}
        .alert-blue{background:rgba(59,130,246,0.15);border-left:3px solid #3b82f6;color:#3b82f6;}
        .alert-yellow{background:rgba(245,158,11,0.15);border-left:3px solid #f59e0b;color:#f59e0b;}
        hr{margin:20px 0;border-color:rgba(255,255,255,0.05);}
        .flex-between{display:flex;justify-content:space-between;align-items:center;}
        .toast-popup{position:fixed;top:20px;right:20px;background:#ef4444;color:white;padding:15px 25px;border-radius:12px;z-index:1000;animation:slideIn 0.3s ease;}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
        /* NEW: shareable link styles */
        .share-box{margin:15px 0;padding:15px;background:rgba(0,0,0,0.3);border-radius:14px;}
        .share-box label{display:block;margin-bottom:8px;color:#c4c4e0;font-size:0.8rem;}
        .link-row{display:flex;gap:10px;align-items:center;}
        .link-row input{flex:1;padding:10px;background:rgba(0,0,0,0.5);border:1px solid rgba(102,126,234,0.3);border-radius:10px;color:#667eea;font-family:monospace;font-size:0.8rem;}
        .link-row input:focus{outline:none;border-color:#667eea;}
        .link-row button{padding:10px 15px;margin:0;}
        .link-hint{display:block;margin-top:8px;font-size:0.7rem;color:#a0a0c0;}
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1><i class="fas fa-paper-plane"></i> Sender Panel</h1>
            <button class="back-btn" onclick="goHome()"><i class="fas fa-arrow-left"></i> Home</button>
        </div>
        <div class="card">
            <div class="card-head"><h2><i class="fas fa-plus-circle"></i> Create Session</h2></div>
            <div class="card-body">
                <div class="input-group">
                    <label>Timeout (seconds)</label>
                    <input type="number" id="timeoutBox" value="300">
                </div>
                <button class="btn btn-primary btn-block" onclick="createSession()">Create Session</button>
                <div id="sessionArea" style="display:none;">
                    <div class="session-box"><i class="fas fa-key"></i> Code: <span id="codeDisplay">---</span></div>
                    <button class="btn btn-second btn-block" onclick="copyCode()">Copy Code</button>
                    
                    <!-- NEW: Shareable Link Box -->
                    <div class="share-box">
                        <label><i class="fas fa-link"></i> Shareable Join Link</label>
                        <div class="link-row">
                            <input type="text" id="shareLink" readonly placeholder="Link will appear after session creation">
                            <button class="btn-second" onclick="copyShareLink()"><i class="far fa-copy"></i> Copy</button>
                        </div>
                        <small class="link-hint"><i class="fas fa-info-circle"></i> Send this link to receiver - they click and join instantly!</small>
                    </div>
                    
                    <div class="timer-card">
                        <div class="timer-digits" id="timerShow">--:--</div>
                        <div class="timer-label">Time Remaining</div>
                    </div>
                    
                    <div class="flex-between">
                        <span>Status:</span>
                        <span class="status-badge badge-active" id="statusBadge">Waiting</span>
                    </div>
                    
                    <div class="alert-box alert-yellow">
                        <i class="fas fa-info-circle"></i> Session will end when receiver clicks "End Session"
                    </div>
                    <button class="btn btn-danger btn-block" onclick="endMySession()">
                        <i class="fas fa-power-off"></i> End Session
                    </button>
                    
                    <hr><h3><i class="fas fa-envelope"></i> Send Text</h3>
                    <textarea id="textMsg" rows="3" placeholder="Type message..."></textarea>
                    <button class="btn btn-primary btn-block" onclick="sendText()">Send Text</button>
                    
                    <hr><h3><i class="fas fa-file"></i> Send File</h3>
                    <input type="file" id="fileInput">
                    <button class="btn btn-primary btn-block" onclick="uploadFile()">Upload & Encrypt</button>
                    
                    <div class="progress-wrapper" id="progressDiv" style="display:none;">
                        <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
                        <div class="progress-stats"><span id="progressPct">0%</span><span id="progressBytes">0/0</span></div>
                    </div>
                    
                    <div id="alertBox"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let sessionId = null;
        let timerInterval = null;
        let pollInterval = null;
        
        function showToast(msg){
            let toast=document.createElement('div');
            toast.className='toast-popup';
            toast.innerHTML=msg;
            document.body.appendChild(toast);
            setTimeout(()=>{toast.remove();},3000);
        }
        
        function showAlert(msg,type){
            let box=document.getElementById('alertBox');
            let cls=type==='success'?'alert-green':(type==='error'?'alert-red':'alert-blue');
            box.innerHTML=`<div class="alert-box ${cls}">${msg}</div>`;
            setTimeout(()=>{if(box.innerHTML.includes(msg)) box.innerHTML='';},4000);
        }
        
        function goHome(){
            if(timerInterval) clearInterval(timerInterval);
            if(pollInterval) clearInterval(pollInterval);
            window.location.href='/';
        }
        
        // NEW: update shareable link
        function updateShareLink(){
            if(sessionId){
                let fullLink = window.location.origin + "/join/" + sessionId;
                document.getElementById('shareLink').value = fullLink;
            }
        }
        
        // NEW: copy shareable link
        function copyShareLink(){
            let linkInput = document.getElementById('shareLink');
            linkInput.select();
            linkInput.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(linkInput.value);
            showAlert('Join link copied! Share with receiver.','success');
        }
        
        async function createSession(){
            let t=document.getElementById('timeoutBox').value;
            try{
                let res=await fetch('/session/create',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({timeout:t?parseInt(t):300})
                });
                let data=await res.json();
                if(data.sessionKey){
                    sessionId=data.sessionKey;
                    document.getElementById('codeDisplay').innerText=sessionId;
                    document.getElementById('sessionArea').style.display='block';
                    updateShareLink(); // NEW: generate shareable link
                    showAlert('Session created! Share the link with receiver.','success');
                    startTimer(data.timeout||300);
                    startPolling();
                }
            }catch(e){showAlert('Creation failed','error');}
        }
        
        function startTimer(sec){
            if(timerInterval) clearInterval(timerInterval);
            let left=sec;
            updateTimerDisplay(left);
            timerInterval=setInterval(async()=>{
                left--;
                if(left<=0){
                    clearInterval(timerInterval);
                    document.getElementById('timerShow').innerHTML='Expired';
                    showAlert('Session expired!','error');
                }else{
                    updateTimerDisplay(left);
                }
                if(sessionId){
                    try{
                        let res=await fetch(`/session/info/${sessionId}`);
                        let data=await res.json();
                        if(data.exists&&data.remainingTime){
                            left=Math.floor(data.remainingTime);
                            updateTimerDisplay(left);
                        }
                    }catch(e){}
                }
            },1000);
        }
        
        function updateTimerDisplay(s){
            let m=Math.floor(s/60),sec=s%60;
            document.getElementById('timerShow').innerHTML=`${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            let el=document.getElementById('timerShow');
            if(s<10){el.classList.add('timer-danger');}
            else if(s<30){el.classList.add('timer-warning');}
            else{el.classList.remove('timer-danger','timer-warning');}
        }
        
        async function startPolling(){
            if(pollInterval) clearInterval(pollInterval);
            
            let checkSession=async()=>{
                if(!sessionId) return;
                try{
                    let res=await fetch(`/session/info/${sessionId}`);
                    let data=await res.json();
                    
                    if(!data.exists){
                        showToast('⚠️ Session was terminated! Redirecting to home...');
                        if(pollInterval) clearInterval(pollInterval);
                        if(timerInterval) clearInterval(timerInterval);
                        setTimeout(()=>{
                            window.location.href='/';
                        },2000);
                        return;
                    }
                    
                    let statusRes=await fetch(`/session/status/${sessionId}`);
                    let status=await statusRes.json();
                    if(status.status==='gone'){
                        document.getElementById('statusBadge').innerHTML='Session Ended';
                        showToast('⚠️ Session was terminated by receiver!');
                        clearInterval(pollInterval);
                        setTimeout(()=>{
                            window.location.href='/';
                        },2000);
                    }else{
                        document.getElementById('statusBadge').innerHTML=status.receiverOnline?'Receiver Connected ✅':'Waiting for Receiver...';
                    }
                }catch(e){}
            };
            
            checkSession();
            pollInterval=setInterval(checkSession,2000);
        }
        
        function copyCode(){
            navigator.clipboard.writeText(sessionId);
            showAlert('Code copied!','success');
        }
        
        async function sendText(){
            let msg=document.getElementById('textMsg').value;
            if(!msg){showAlert('Type a message','error');return;}
            if(!sessionId){showAlert('Create session first','error');return;}
            try{
                let res=await fetch(`/session/send/${sessionId}`,{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({message:msg})
                });
                let data=await res.json();
                if(data.msg==='text message sent'){
                    showAlert('Text sent!','success');
                    document.getElementById('textMsg').value='';
                    showToast('📨 Text message sent to receiver');
                }else{
                    showAlert(data.msg||'Failed','error');
                }
            }catch(e){showAlert('Error','error');}
        }
        
        async function uploadFile(){
            let file=document.getElementById('fileInput').files[0];
            if(!file){showAlert('Select a file','error');return;}
            if(!sessionId){showAlert('Create session first','error');return;}
            let fd=new FormData();
            fd.append('file',file);
            let progDiv=document.getElementById('progressDiv');
            progDiv.style.display='block';
            document.getElementById('progressFill').style.width='0%';
            document.getElementById('progressPct').innerText='0%';
            document.getElementById('progressBytes').innerText=`0/${file.size}`;
            try{
                let res=await fetch(`/session/upload/${sessionId}`,{method:'POST',body:fd});
                let data=await res.json();
                if(data.msg&&data.msg.includes('uploaded')){
                    let p=0;
                    let intv=setInterval(()=>{
                        p+=10;
                        if(p>=100){
                            clearInterval(intv);
                            document.getElementById('progressFill').style.width='100%';
                            document.getElementById('progressPct').innerText='100%';
                        }else{
                            document.getElementById('progressFill').style.width=p+'%';
                            document.getElementById('progressPct').innerText=p+'%';
                        }
                    },50);
                    document.getElementById('progressBytes').innerText=`${file.size}/${file.size}`;
                    showAlert(`File "${data.fileName}" uploaded!`,'success');
                    showToast('📁 File uploaded and encrypted');
                    setTimeout(()=>{progDiv.style.display='none';},3000);
                }else{
                    showAlert(data.msg||'Upload failed','error');
                    progDiv.style.display='none';
                }
            }catch(e){showAlert('Upload error','error');progDiv.style.display='none';}
        }
        
        async function endMySession(){
            if(!sessionId){showAlert('No session','error');return;}
            let confirmEnd=confirm('End this session? Both you and receiver will go back to home.');
            if(!confirmEnd) return;
            try{
                let res=await fetch(`/session/terminate/${sessionId}`,{method:'POST'});
                let data=await res.json();
                if(data.terminated===true || data.msg.includes('terminated')){
                    showToast('✅ Session terminated! Redirecting...');
                    if(timerInterval) clearInterval(timerInterval);
                    if(pollInterval) clearInterval(pollInterval);
                    setTimeout(()=>{
                        window.location.href='/';
                    },1500);
                }else{
                    showAlert(data.msg||'Failed','error');
                }
            }catch(e){showAlert('Error','error');}
        }
    </script>
</body>
</html>
